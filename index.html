<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Client</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --surface-2: #1a1a1a;
    --border: #222;
    --text: #e8e8e8;
    --text-dim: #777;
    --accent: #fff;
    --think-bg: #0d0d0d;
    --think-border: #2a2a2a;
    --radius: 12px;
    --font: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    max-width: 800px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #settings-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }

  #settings-toggle:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  /* Settings Panel */
  #settings {
    display: none;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #settings.open { display: flex; flex-direction: column; gap: 10px; }

  #settings label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  #settings input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.2s;
  }

  #settings input:focus { border-color: #444; }

  .setting-group { display: flex; flex-direction: column; gap: 4px; }

  /* Chat Area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scrollbar-width: thin;
    scrollbar-color: #222 transparent;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

  .message { animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-self: flex-end;
    background: var(--accent);
    color: #000;
    padding: 10px 16px;
    border-radius: var(--radius) var(--radius) 4px var(--radius);
    max-width: 75%;
    font-size: 14px;
  }

  .message.assistant {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 100%;
  }

  /* Thinking Block */
  .thinking-block {
    border: 1px solid var(--think-border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .thinking-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--think-bg);
    cursor: pointer;
    user-select: none;
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .thinking-header::before {
    content: '▸';
    transition: transform 0.2s;
    font-size: 10px;
  }

  .thinking-block.open .thinking-header::before { transform: rotate(90deg); }

  .thinking-content {
    display: none;
    padding: 14px;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
    border-top: 1px solid var(--think-border);
    white-space: pre-wrap;
    word-break: break-word;
    font-family: var(--font);
  }

  .thinking-block.open .thinking-content { display: block; }

  /* Answer */
  .answer {
    font-size: 15px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .answer code {
    background: var(--surface-2);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--font);
    font-size: 13px;
  }

  .answer pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    overflow-x: auto;
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.5;
    white-space: pre;
  }

  .answer pre code {
    background: none;
    padding: 0;
  }

  /* Error */
  .error {
    color: #888;
    font-size: 13px;
    font-style: italic;
  }

  /* Loading */
  .loading {
    display: flex;
    gap: 4px;
    padding: 8px 0;
  }

  .loading span {
    width: 6px;
    height: 6px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: pulse 1.2s ease infinite;
  }

  .loading span:nth-child(2) { animation-delay: 0.2s; }
  .loading span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 60%, 100% { opacity: 0.2; transform: scale(0.8); }
    30% { opacity: 1; transform: scale(1); }
  }

  /* Input Area */
  #input-area {
    flex-shrink: 0;
    padding: 16px 0 24px;
    border-top: 1px solid var(--border);
  }

  #input-wrapper {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 15px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 48px;
    max-height: 200px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  #input:focus { border-color: #444; }

  #input::placeholder { color: #444; }

  #send {
    background: var(--accent);
    border: none;
    color: #000;
    width: 48px;
    height: 48px;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }

  #send:hover { opacity: 0.85; }
  #send:disabled { opacity: 0.3; cursor: not-allowed; }

  #send svg { width: 20px; height: 20px; }

  /* Empty State */
  #empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <h1>LLM Client</h1>
  <button id="settings-toggle">Settings</button>
</header>

<div id="settings">
  <div class="setting-group">
    <label>Endpoint URL</label>
    <input id="cfg-url" type="text" value="http://localhost:8000/v1/chat/completions" spellcheck="false" />
  </div>
  <div class="setting-group">
    <label>Model</label>
    <input id="cfg-model" type="text" value="" placeholder="model name" spellcheck="false" />
  </div>
  <div class="setting-group">
    <label>API Key (optional)</label>
    <input id="cfg-key" type="password" value="" placeholder="sk-..." spellcheck="false" />
  </div>
</div>

<div id="chat">
  <div id="empty">Send a message to begin.</div>
</div>

<div id="input-area">
  <div id="input-wrapper">
    <textarea id="input" rows="1" placeholder="Message..." autofocus></textarea>
    <button id="send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"></line>
        <polyline points="5 12 12 5 19 12"></polyline>
      </svg>
    </button>
  </div>
</div>

<script>
const $ = (s) => document.querySelector(s);
const chat = $('#chat');
const input = $('#input');
const sendBtn = $('#send');
const empty = $('#empty');
const settingsPanel = $('#settings');

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
});

// Settings toggle
$('#settings-toggle').addEventListener('click', () => {
  settingsPanel.classList.toggle('open');
});

// Persist settings
const cfgFields = ['cfg-url', 'cfg-model', 'cfg-key'];
cfgFields.forEach(id => {
  const saved = localStorage.getItem(id);
  if (saved) $(`#${id}`).value = saved;
  $(`#${id}`).addEventListener('input', () => {
    localStorage.setItem(id, $(`#${id}`).value);
  });
});

function getConfig() {
  return {
    url: $('#cfg-url').value.trim(),
    model: $('#cfg-model').value.trim(),
    apiKey: $('#cfg-key').value.trim(),
  };
}

// Parse <think> tags from response
function parseResponse(text) {
  const thinkRegex = /^<think>([\s\S]*?)<\/think>\s*/;
  const match = text.match(thinkRegex);
  if (match) {
    return {
      thinking: match[1].trim(),
      answer: text.slice(match[0].length).trim(),
    };
  }
  return { thinking: null, answer: text };
}

// Simple markdown-ish rendering (code blocks + inline code)
function renderText(text) {
  // Escape HTML
  const esc = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Code blocks
  let out = esc.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  out = out.replace(/`([^`]+)`/g, '<code>$1</code>');
  return out;
}

function addMessage(role, content) {
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = `message ${role}`;

  if (role === 'user') {
    div.textContent = content;
  } else {
    const { thinking, answer } = parseResponse(content);

    if (thinking) {
      const block = document.createElement('div');
      block.className = 'thinking-block';
      block.innerHTML = `
        <div class="thinking-header">Thinking</div>
        <div class="thinking-content">${renderText(thinking)}</div>
      `;
      block.querySelector('.thinking-header').addEventListener('click', () => {
        block.classList.toggle('open');
      });
      div.appendChild(block);
    }

    const answerDiv = document.createElement('div');
    answerDiv.className = 'answer';
    answerDiv.innerHTML = renderText(answer || content);
    div.appendChild(answerDiv);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addLoading() {
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

let conversationHistory = [];

async function send() {
  const text = input.value.trim();
  if (!text) return;

  const config = getConfig();
  if (!config.url) {
    alert('Set the endpoint URL in settings.');
    settingsPanel.classList.add('open');
    return;
  }

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  const loader = addLoading();

  try {
    const headers = { 'Content-Type': 'application/json' };
    if (config.apiKey) headers['Authorization'] = `Bearer ${config.apiKey}`;

    const body = {
      messages: [...conversationHistory],
      stream: false,
    };
    if (config.model) body.model = config.model;

    const res = await fetch(config.url, { method: 'POST', headers, body: JSON.stringify(body) });

    if (!res.ok) {
      const errText = await res.text().catch(() => res.statusText);
      throw new Error(`${res.status} — ${errText}`);
    }

    const data = await res.json();
    const content = data.choices?.[0]?.message?.content ?? 'No response.';

    loader.remove();
    addMessage('assistant', content);
    conversationHistory.push({ role: 'assistant', content });
  } catch (err) {
    loader.remove();
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.innerHTML = `<div class="error">${err.message}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  sendBtn.disabled = false;
  input.focus();
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
</script>
</body>
</html>
